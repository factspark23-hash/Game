<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIND — The Brain Melter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f;
  --primary: #00f0ff;
  --secondary: #ff00aa;
  --accent: #ffe600;
  --danger: #ff3333;
  --success: #00ff88;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
}

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  overflow: hidden;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(0,240,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255,0,170,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(255,230,0,0.04) 0%, transparent 50%);
  animation: bgPulse 8s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes bgPulse {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* Scanlines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

#app {
  position: relative;
  z-index: 1;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ===== TITLE SCREEN ===== */
#title-screen {
  text-align: center;
  animation: fadeIn 1s ease;
}

#title-screen h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(3rem, 10vw, 8rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.3em;
  text-shadow: 0 0 60px rgba(0,240,255,0.3);
  animation: titleGlow 3s ease-in-out infinite alternate;
}

@keyframes titleGlow {
  0% { filter: brightness(1); }
  100% { filter: brightness(1.3); }
}

#title-screen .subtitle {
  font-size: clamp(0.7rem, 2vw, 1rem);
  color: rgba(255,255,255,0.4);
  margin-top: 1rem;
  letter-spacing: 0.5em;
  text-transform: uppercase;
}

#title-screen .warning {
  margin-top: 2rem;
  padding: 1rem 2rem;
  border: 1px solid var(--danger);
  background: rgba(255,51,51,0.1);
  color: var(--danger);
  font-size: 0.8rem;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
  animation: warningPulse 2s ease-in-out infinite;
}

@keyframes warningPulse {
  0%, 100% { border-color: var(--danger); }
  50% { border-color: transparent; }
}

.btn {
  display: inline-block;
  margin-top: 2rem;
  padding: 1rem 3rem;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--bg);
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border: none;
  cursor: pointer;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0,240,255,0.4);
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: translateX(-100%);
  animation: btnShine 3s infinite;
}

@keyframes btnShine {
  0% { transform: translateX(-100%); }
  50%, 100% { transform: translateX(100%); }
}

.btn-small {
  padding: 0.6rem 1.5rem;
  font-size: 0.8rem;
}

/* ===== HUD ===== */
#hud {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,10,15,0.9);
  border-bottom: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
  z-index: 100;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8rem;
}

#hud .level-info {
  color: var(--primary);
}

#hud .level-name {
  color: var(--secondary);
  margin-left: 1rem;
  font-size: 0.7rem;
}

#hud .timer {
  color: var(--accent);
  font-size: 1.2rem;
  font-weight: 700;
}

#hud .timer.danger { color: var(--danger); animation: timerDanger 0.5s infinite; }

@keyframes timerDanger {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

#hud .lives {
  color: var(--danger);
  font-size: 1.1rem;
}

/* ===== GAME AREA ===== */
#game-area {
  width: 90vw;
  max-width: 800px;
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  padding: 2rem;
}

.level-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  color: var(--primary);
  text-align: center;
}

.level-desc {
  color: rgba(255,255,255,0.6);
  text-align: center;
  max-width: 600px;
  line-height: 1.6;
  font-size: 0.85rem;
}

.level-rules {
  color: var(--accent);
  text-align: center;
  font-size: 0.75rem;
  padding: 0.8rem 1.5rem;
  border: 1px solid rgba(255,230,0,0.2);
  background: rgba(255,230,0,0.05);
  max-width: 600px;
}

/* Grid styles */
.game-grid {
  display: grid;
  gap: 4px;
}

.grid-cell {
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}

.grid-cell:hover {
  border-color: var(--primary);
  background: rgba(0,240,255,0.1);
}

.grid-cell.active {
  background: rgba(0,240,255,0.2);
  border-color: var(--primary);
  box-shadow: 0 0 15px rgba(0,240,255,0.3);
}

.grid-cell.correct {
  background: rgba(0,255,136,0.2);
  border-color: var(--success);
}

.grid-cell.wrong {
  background: rgba(255,51,51,0.2);
  border-color: var(--danger);
  animation: shake 0.3s;
}

.grid-cell.locked {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
  cursor: default;
  color: rgba(255,255,255,0.5);
}

.grid-cell.empty {
  background: rgba(255,0,170,0.1);
  border-color: var(--secondary);
  border-style: dashed;
}

.grid-cell.empty:hover {
  background: rgba(255,0,170,0.2);
}

.grid-cell.flash {
  animation: cellFlash 0.5s;
}

@keyframes cellFlash {
  0% { background: var(--primary); transform: scale(1.1); }
  100% { background: var(--glass); transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Sequence display */
.sequence-display {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.seq-item {
  width: 60px;
  height: 60px;
  border-radius: 8px;
  border: 2px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem;
  cursor: pointer;
  transition: all 0.15s;
}

.seq-item:hover { transform: scale(1.1); }
.seq-item.lit { box-shadow: 0 0 30px currentColor; transform: scale(1.15); }

/* Color buttons */
.color-btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.color-btn:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.6); }
.color-btn:active { transform: scale(0.95); }
.color-btn.lit::after {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  background: inherit;
  filter: blur(15px);
  opacity: 0.6;
  z-index: -1;
}

/* Input fields */
.game-input {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 1.2rem;
  padding: 0.8rem 1.5rem;
  text-align: center;
  outline: none;
  width: 200px;
  transition: border-color 0.3s;
}

.game-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(0,240,255,0.2);
}

/* Options / choices */
.choices {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.choice-btn {
  padding: 0.8rem 1.5rem;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 80px;
  text-align: center;
}

.choice-btn:hover {
  border-color: var(--primary);
  background: rgba(0,240,255,0.1);
}

.choice-btn.selected {
  border-color: var(--primary);
  background: rgba(0,240,255,0.2);
  box-shadow: 0 0 15px rgba(0,240,255,0.2);
}

/* Info boxes */
.info-box {
  padding: 0.6rem 1.2rem;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  font-size: 0.8rem;
  color: rgba(255,255,255,0.7);
  text-align: center;
}

.info-box.highlight {
  border-color: var(--primary);
  color: var(--primary);
}

/* Multi-panel layout */
.panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  width: 100%;
  max-width: 700px;
}

.panel {
  padding: 1rem;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  text-align: center;
}

.panel-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  color: var(--secondary);
  margin-bottom: 0.8rem;
  letter-spacing: 0.2em;
}

/* ===== TRANSITION SCREEN ===== */
#transition-screen {
  text-align: center;
  animation: fadeIn 0.5s;
}

#transition-screen .level-num {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(4rem, 12vw, 10rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#transition-screen .level-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  color: var(--accent);
  letter-spacing: 0.3em;
}

#transition-screen .level-subtitle {
  color: rgba(255,255,255,0.4);
  margin-top: 1rem;
  font-size: 0.8rem;
}

/* ===== FAIL SCREEN ===== */
#fail-screen {
  text-align: center;
  animation: fadeIn 0.5s;
}

#fail-screen h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 3rem;
  color: var(--danger);
}

#fail-screen .fail-msg {
  color: rgba(255,255,255,0.5);
  margin-top: 1rem;
}

/* ===== WIN SCREEN ===== */
#win-screen {
  text-align: center;
  animation: fadeIn 1s;
}

#win-screen h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--success), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#win-screen .stats {
  margin-top: 2rem;
  color: rgba(255,255,255,0.5);
  font-size: 0.85rem;
  line-height: 2;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in { animation: fadeIn 0.5s ease; }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .grid-cell { width: 40px; height: 40px; font-size: 0.9rem; }
  .seq-item { width: 50px; height: 50px; }
  .color-btn { width: 55px; height: 55px; }
  .panels { grid-template-columns: 1fr; }
  #hud { padding: 0.6rem 1rem; font-size: 0.65rem; }
}

/* Puzzle piece / shapes */
.shape-canvas {
  border: 1px solid var(--glass-border);
  background: rgba(0,0,0,0.3);
}

/* Progress bar */
.progress-bar {
  width: 100%;
  max-width: 400px;
  height: 4px;
  background: var(--glass);
  margin-top: 1rem;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  transition: width 0.5s;
}

/* Number pad for mobile */
.numpad {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  max-width: 240px;
}

.numpad-btn {
  padding: 0.8rem;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}

.numpad-btn:hover { border-color: var(--primary); background: rgba(0,240,255,0.1); }
.numpad-btn:active { transform: scale(0.95); }

/* Stroop colors */
.stroop-word {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  user-select: none;
  margin: 1rem 0;
  transition: all 0.2s;
}

/* Connection lines */
.connection-area {
  position: relative;
  width: 100%;
  max-width: 500px;
  height: 300px;
}

/* Matrix display */
.matrix-display {
  font-family: 'Space Mono', monospace;
  font-size: 1.4rem;
  line-height: 1.8;
  letter-spacing: 0.5em;
  color: var(--primary);
  white-space: pre;
}

/* Countdown overlay */
.countdown-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,10,15,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  font-family: 'Orbitron', sans-serif;
  font-size: 8rem;
  font-weight: 900;
  color: var(--primary);
  animation: countdownPop 0.5s ease;
}

@keyframes countdownPop {
  0% { transform: scale(2); opacity: 0; }
  50% { transform: scale(0.9); }
  100% { transform: scale(1); opacity: 1; }
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: rgba(10,10,15,0.95);
  border: 1px solid var(--primary);
  padding: 0.5rem 1rem;
  font-size: 0.7rem;
  color: var(--primary);
  pointer-events: none;
  z-index: 200;
}

/* Dual task separator */
.dual-separator {
  width: 2px;
  background: linear-gradient(180deg, transparent, var(--secondary), transparent);
  align-self: stretch;
}
</style>
</head>
<body>

<div id="app">
  <!-- Title Screen -->
  <div id="title-screen">
    <h1>MIND</h1>
    <div class="subtitle">the brain melter</div>
    <div class="warning">
      ⚠️ WARNING: This game activates multiple cognitive functions simultaneously.<br>
      10 levels. Brutal from level 1. Less than 1% will finish.<br>
      You have been warned.
    </div>
    <button class="btn" onclick="startGame()">BEGIN</button>
  </div>

  <!-- Transition Screen -->
  <div id="transition-screen" style="display:none">
    <div class="level-num" id="trans-level">1</div>
    <div class="level-label" id="trans-label">LOADING</div>
    <div class="level-subtitle" id="trans-sub"></div>
  </div>

  <!-- Game HUD -->
  <div id="hud" style="display:none">
    <div>
      <span class="level-info">LEVEL <span id="hud-level">1</span>/10</span>
      <span class="level-name" id="hud-name"></span>
    </div>
    <div class="timer" id="hud-timer">--:--</div>
    <div class="lives" id="hud-lives">♥ ♥ ♥</div>
  </div>

  <!-- Game Area -->
  <div id="game-area" style="display:none"></div>

  <!-- Fail Screen -->
  <div id="fail-screen" style="display:none">
    <h2>SYSTEM FAILURE</h2>
    <div class="fail-msg" id="fail-msg">Your mind collapsed.</div>
    <div style="margin-top:1rem; color:rgba(255,255,255,0.3); font-size:0.8rem;" id="fail-stats"></div>
    <button class="btn btn-small" onclick="retryLevel()" style="margin-top:1.5rem; margin-right:0.5rem;">RETRY</button>
    <button class="btn btn-small" onclick="restartGame()" style="margin-top:1.5rem; background:linear-gradient(135deg,var(--danger),#ff6600);">RESTART</button>
  </div>

  <!-- Win Screen -->
  <div id="win-screen" style="display:none">
    <h2>MIND CONQUERED</h2>
    <div style="color:rgba(255,255,255,0.5); margin-top:1rem;">You are the 1%.</div>
    <div class="stats" id="win-stats"></div>
    <button class="btn btn-small" onclick="restartGame()" style="margin-top:2rem;">PLAY AGAIN</button>
  </div>
</div>

<script>
// ===== GAME STATE =====
const state = {
  level: 0,
  lives: 3,
  timer: 0,
  timerInterval: null,
  timeLimit: 0,
  levelStartTime: 0,
  totalTime: 0,
  levelTimes: [],
  attempts: [],
  currentLevelData: null,
  phase: 'title', // title, transition, playing, fail, win
  inputLocked: false
};

// ===== AUDIO ENGINE =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, duration = 0.2, type = 'sine') {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

const NOTES = {
  C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23,
  G4: 392.00, A4: 440.00, B4: 493.88, C5: 523.25,
  D5: 587.33, E5: 659.25
};

function playSuccess() { playTone(NOTES.E5, 0.15); setTimeout(() => playTone(NOTES.C5, 0.3), 150); }
function playFail() { playTone(200, 0.4, 'sawtooth'); }
function playClick() { playTone(800, 0.05, 'square'); }
function playLevelUp() {
  [NOTES.C4, NOTES.E4, NOTES.G4, NOTES.C5].forEach((n, i) => {
    setTimeout(() => playTone(n, 0.2), i * 120);
  });
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
  ['title-screen', 'transition-screen', 'game-area', 'fail-screen', 'win-screen', 'hud'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = '';
  if (id === 'game-area') document.getElementById('hud').style.display = '';
}

// ===== TIMER =====
function startTimer(seconds) {
  state.timeLimit = seconds;
  state.timer = seconds;
  updateTimerDisplay();
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timer--;
    updateTimerDisplay();
    if (state.timer <= 10) {
      document.getElementById('hud-timer').classList.add('danger');
    }
    if (state.timer <= 0) {
      clearInterval(state.timerInterval);
      failLevel('Time expired.');
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(state.timerInterval);
  document.getElementById('hud-timer').classList.remove('danger');
}

function updateTimerDisplay() {
  const m = Math.floor(state.timer / 60);
  const s = state.timer % 60;
  document.getElementById('hud-timer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ===== LIVES =====
function updateLives() {
  document.getElementById('hud-lives').textContent = '♥ '.repeat(state.lives).trim() || '💀';
}

// ===== GAME FLOW =====
function startGame() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  state.level = 0;
  state.lives = 3;
  state.totalTime = 0;
  state.levelTimes = [];
  state.attempts = [];
  nextLevel();
}

function restartGame() {
  startGame();
}

function retryLevel() {
  if (state.lives <= 0) {
    alert('No lives remaining. Restarting...');
    restartGame();
    return;
  }
  showTransition(state.level);
}

function nextLevel() {
  state.level++;
  if (state.level > 15) {
    winGame();
    return;
  }
  showTransition(state.level);
}

function showTransition(level) {
  state.phase = 'transition';
  const names = [
    '', 'NEURAL STORM', 'DUAL CORTEX', 'LOGIC WEB', 'SPATIAL HELL',
    'MEMORY OVERLOAD', 'STROOP INFERNO', 'ATTENTION SPLIT', 'PATTERN MAZE',
    'SYNAPSE FIRE', 'OMEGA MIND', 'REACTION STORM', 'PATTERN COMBAT',
    'SPEED DEMON', 'REFLEX DUEL', 'FINAL BOSS'
  ];
  const subs = [
    '', 'Memory + Math under pressure', 'Two sequences, two modalities',

// ===== UTILITY =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function countdown(seconds, callback) {
  const overlay = document.createElement('div');
  overlay.className = 'countdown-overlay';
  overlay.textContent = seconds;
  document.body.appendChild(overlay);
  let count = seconds;
  const interval = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(interval);
      overlay.remove();
      callback();
    } else {
      overlay.textContent = count;
      overlay.style.animation = 'none';
      overlay.offsetHeight;
      overlay.style.animation = 'countdownPop 0.5s ease';
    }
  }, 1000);
}

// ===== LEVEL 1: NEURAL STORM =====
// Memory + Math: Memorize a grid, then solve missing cells using row/col sum constraints
function level1() {
  const area = document.getElementById('game-area');
  const SIZE = 4;
  
  // Generate grid with unique numbers 1-16
  const nums = shuffle(Array.from({length: 16}, (_, i) => i + 1));
  const grid = [];
  for (let r = 0; r < SIZE; r++) {
    grid.push(nums.slice(r * SIZE, (r + 1) * SIZE));
  }
  
  const rowSums = grid.map(row => row.reduce((a, b) => a + b, 0));
  const colSums = Array.from({length: SIZE}, (_, c) => grid.reduce((sum, row) => sum + row[c], 0));
  
  // Hide some cells (6 cells)
  const hidden = new Set();
  while (hidden.size < 6) {
    hidden.add(randInt(0, 15));
  }
  const hiddenSet = hidden;
  const hiddenValues = {};
  hiddenSet.forEach(idx => {
    const r = Math.floor(idx / SIZE), c = idx % SIZE;
    hiddenValues[idx] = grid[r][c];
  });

  area.innerHTML = `
    <div class="level-title">NEURAL STORM</div>
    <div class="level-desc">Memorize the grid. Cells will disappear. Fill them using row & column sum constraints.</div>
    <div class="level-rules">You have 8 seconds to memorize. Then 90 seconds to solve.</div>
    <div class="info-box highlight" id="l1-status">MEMORIZE NOW</div>
    <div class="game-grid" id="l1-grid" style="grid-template-columns: repeat(${SIZE}, 50px);"></div>
    <div style="display:flex;gap:2rem;margin-top:0.5rem;">
      <div class="info-box" id="l1-rowsums"></div>
      <div class="info-box" id="l1-colsums"></div>
    </div>
  `;

  const gridEl = document.getElementById('l1-grid');
  
  function renderGrid(phase) {
    gridEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const idx = r * SIZE + c;
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.dataset.idx = idx;
        
        if (phase === 'memorize') {
          cell.textContent = grid[r][c];
          cell.classList.add('locked');
        } else if (phase === 'solve') {
          if (hiddenSet.has(idx)) {
            cell.classList.add('empty');
            cell.textContent = '';
            cell.addEventListener('click', () => selectCell(idx));
          } else {
            cell.textContent = grid[r][c];
            cell.classList.add('locked');
          }
        }
        gridEl.appendChild(cell);
      }
    }
  }

  // Show row/col sums
  document.getElementById('l1-rowsums').textContent = 'Row sums: ' + rowSums.join(' | ');
  document.getElementById('l1-colsums').textContent = 'Col sums: ' + colSums.join(' | ');

  renderGrid('memorize');

  let selectedCell = null;
  const filledValues = {};

  function selectCell(idx) {
    if (state.inputLocked) return;
    document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('active'));
    const cell = gridEl.children[idx];
    cell.classList.add('active');
    selectedCell = idx;
    document.getElementById('l1-status').textContent = `Selected cell ${Math.floor(idx/4)+1},${idx%4+1}. Enter value (1-16):`;
  }

  // After memorize phase
  setTimeout(() => {
    renderGrid('solve');
    document.getElementById('l1-status').textContent = 'SOLVE: Click empty cells, then enter numbers below.';
    
    // Add number input
    const inputRow = document.createElement('div');
    inputRow.style.cssText = 'display:flex;gap:8px;margin-top:1rem;align-items:center;';
    inputRow.innerHTML = `
      <input type="number" class="game-input" id="l1-input" min="1" max="16" style="width:100px;">
      <button class="btn btn-small" id="l1-submit">PLACE</button>
    `;
    area.appendChild(inputRow);

    document.getElementById('l1-submit').addEventListener('click', () => {
      if (selectedCell === null || state.inputLocked) return;
      const val = parseInt(document.getElementById('l1-input').value);
      if (isNaN(val) || val < 1 || val > 16) return;
      
      // Check if already used
      if (Object.values(filledValues).includes(val)) {
        playFail();
        document.getElementById('l1-status').textContent = 'Number already used!';
        return;
      }
      
      filledValues[selectedCell] = val;
      const cell = gridEl.children[selectedCell];
      cell.textContent = val;
      cell.classList.remove('empty', 'active');
      playClick();
      document.getElementById('l1-input').value = '';
      selectedCell = null;

      // Check if all filled
      if (Object.keys(filledValues).length === hiddenSet.size) {
        // Verify
        let allCorrect = true;
        hiddenSet.forEach(idx => {
          if (filledValues[idx] !== hiddenValues[idx]) {
            allCorrect = false;
            gridEl.children[idx].classList.add('wrong');
          } else {
            gridEl.children[idx].classList.add('correct');
          }
        });
        state.inputLocked = true;
        if (allCorrect) {
          setTimeout(() => completeLevel(), 1000);
        } else {
          setTimeout(() => failLevel('Incorrect cells.'), 1500);
        }
      }
    });

    startTimer(90);
  }, 8000);
}

      document.getElementById('l2-input-area').style.display = '';
      setupInput();

    }

    colorDisp.style.boxShadow = `0 0 30px ${colors[colorSeq[seqIdx]]}`;
    toneDisp.textContent = `♪ ${toneSeq[seqIdx] + 1}`;

      colorDisp.style.boxShadow = 'none';

}

// Interconnected logic puzzles
function level3() {
  const area = document.getElementById('game-area');

  const people = ['Alice', 'Bob', 'Carol', 'Dave'];
  const colors = ['Red', 'Blue', 'Green', 'Yellow'];
  const answer = shuffle([0, 1, 2, 3]); // answer[i] = color index for person i
  
  // Generate clues (some true, some false - deception!)
  const clues = [];
  
  // Clue 1: Direct assignment
  const p1 = randInt(0, 3);
  clues.push({ text: `${people[p1]}'s color is ${colors[answer[p1]]}.`, type: 'direct', person: p1, value: answer[p1] });
  
  // Clue 2: Not assignment
  let p2 = randInt(0, 3);
  let wrongColor = randInt(0, 3);
  while (wrongColor === answer[p2]) wrongColor = randInt(0, 3);
  clues.push({ text: `${people[p2]} does NOT have ${colors[wrongColor]}.`, type: 'not', person: p2, value: wrongColor });
  
  // Clue 3: Relative
  const pairs = [];
  for (let i = 0; i < 4; i++) for (let j = i + 1; j < 4; j++) pairs.push([i, j]);
  const pair = pairs[randInt(0, pairs.length - 1)];
  clues.push({ text: `Either ${people[pair[0]]} or ${people[pair[1]]} has ${colors[answer[pair[0]]]}.`, type: 'either', p1: pair[0], p2: pair[1], value: answer[pair[0]] });
  
  // Clue 4: Count clue
  const targetColor = randInt(0, 3);
  const count = answer.filter(a => a === targetColor).length;
  clues.push({ text: `Exactly ${count} people have ${colors[targetColor]}.`, type: 'count', value: targetColor, count });
  
  // Clue 5-6: More constraints
  let p5 = randInt(0, 3);
  let related = randInt(0, 3);
  while (related === p5) related = randInt(0, 3);
  clues.push({ text: `${people[p5]}'s color is different from ${people[related]}'s.`, type: 'diff', p1: p5, p2: related });

  area.innerHTML = `

  const cluesEl = document.getElementById('l3-clues');
  clues.forEach((clue, i) => {
    cluesEl.innerHTML += `<div class="info-box" style="margin-bottom:4px;text-align:left;">Clue ${i+1}: ${clue.text}</div>`;
  });

  const gridEl = document.getElementById('l3-grid');

  // Header
  gridEl.innerHTML = '<div></div>';
  colors.forEach(c => {
    gridEl.innerHTML += `<div class="panel-title" style="font-size:0.6rem;">${c}</div>`;
  });

  people.forEach((person, pi) => {
    gridEl.innerHTML += `<div style="font-size:0.8rem;display:flex;align-items:center;">${person}</div>`;
    selections[pi] = -1;
    colors.forEach((_, ci) => {
      const cell = document.createElement('div');

      cell.style.padding = '0.5rem';

      cell.textContent = '';

      cell.addEventListener('click', () => {

        // Clear this row

          c.classList.remove('selected');

        cell.classList.add('selected');

        playClick();
      });
      gridEl.appendChild(cell);

  document.getElementById('l3-check').addEventListener('click', () => {

}

// ===== LEVEL 4: SPATIAL HELL =====
// Mental rotation + object tracking
function level4() {
  const area = document.getElementById('game-area');
  const SIZE = 5;
  
  // Create a shape on a grid, rotate it, ask which rotation is correct
  const shapes = [
    [[1,1,0],[0,1,0],[0,1,1]], // L
    [[1,1],[1,1]], // Square
    [[0,1,0],[1,1,1],[0,1,0]], // Plus
    [[1,0],[1,1],[0,1]], // S
    [[1,1,1],[0,1,0],[0,1,0]], // T
  ];
  
  const shape = shapes[randInt(0, shapes.length - 1)];
  
  function rotateShape(s) {
    const rows = s.length, cols = s[0].length;
    const rotated = [];
    for (let c = 0; c < cols; c++) {
      rotated.push([]);
      for (let r = rows - 1; r >= 0; r--) {
        rotated[c].push(s[r][c]);
      }
    }
    return rotated;
  }

  const rotations = [shape];
  for (let i = 1; i < 4; i++) {
    rotations.push(rotateShape(rotations[i - 1]));
  }

  const correctRotation = randInt(0, 3);
  const shownRotation = randInt(0, 3);

  function renderShape(s, container, cellSize = 30) {
    const grid = document.createElement('div');
    grid.style.cssText = `display:inline-grid;grid-template-columns:repeat(${s[0].length},${cellSize}px);gap:2px;`;
    s.forEach(row => {
      row.forEach(cell => {
        const d = document.createElement('div');
        d.style.cssText = `width:${cellSize}px;height:${cellSize}px;border-radius:4px;`;
        d.style.background = cell ? 'var(--primary)' : 'transparent';
        grid.appendChild(d);
      });
    });
    container.appendChild(grid);
  }

  area.innerHTML = `
    <div class="level-title">SPATIAL HELL</div>
    <div class="level-desc">This shape was rotated. Which rotation matches?</div>
    <div class="level-rules">Identify the correct rotation. 45 seconds.</div>
    <div class="panel-title" style="margin-bottom:0.5rem;">ORIGINAL SHAPE (shown rotated ${shownRotation * 90}°)</div>
    <div id="l4-original" style="margin-bottom:1.5rem;"></div>
    <div class="panel-title" style="margin-bottom:0.5rem;">WHICH IS THE CORRECT 0° ROTATION?</div>
    <div id="l4-options" style="display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;"></div>
  `;

  // Show the shape rotated
  const origEl = document.getElementById('l4-original');
  renderShape(rotations[shownRotation], origEl, 40);

  // Show 4 options (one correct, three rotated differently)
  const optionsEl = document.getElementById('l4-options');
  const optionIndices = shuffle([0, 1, 2, 3]);

  optionIndices.forEach((rot, i) => {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'text-align:center;cursor:pointer;padding:0.8rem;border:1px solid var(--glass-border);transition:all 0.2s;';
    wrapper.innerHTML = `<div style="font-family:Orbitron;font-size:0.7rem;color:rgba(255,255,255,0.4);margin-bottom:0.5rem;">${String.fromCharCode(65 + i)}</div>`;
    renderShape(rotations[rot], wrapper, 30);
    
    wrapper.addEventListener('click', () => {
      if (state.inputLocked) return;
      state.inputLocked = true;
      document.querySelectorAll('#l4-options > div').forEach(w => w.style.borderColor = 'var(--glass-border)');
      
      // The shape shown was rotations[shownRotation], and we need to find which option is the base shape (rotations[0])
      // But actually: we show rotations[shownRotation] as the "original shown rotated"
      // The correct answer is the one that, when rotated by shownRotation*90°, gives the shown shape
      // Which means the answer is rotations[0] if we consider rotations[shownRotation] as the display
      // Actually simpler: answer is the one that matches shape (rotation 0) — but the question asks "which is 0°"
      // The displayed shape is shape rotated by shownRotation steps
      // So the correct 0° rotation is the one where: option rotated by shownRotation = displayed
      // Which is: rotations[(4 - shownRotation) % 4]... no
      // Let me simplify: correct answer is option index where rot === 0 (the base shape)
      
      if (rot === 0) {
        wrapper.style.borderColor = 'var(--success)';
        playSuccess();
        setTimeout(() => completeLevel(), 800);
      } else {
        wrapper.style.borderColor = 'var(--danger)';
        playFail();
        setTimeout(() => failLevel('Wrong rotation.'), 800);
      }
    });
    
    optionsEl.appendChild(wrapper);
  });

  startTimer(45);
}

  // Generate grid
  const grid = Array.from({length: GRID}, () => 
    Array.from({length: GRID}, () => symbols[randInt(0, symbols.length - 1)])
  );
  
  // Generate questions
  const questions = [];
  // Q1: What symbol is at position X,Y?
  const q1r = randInt(0, GRID-1), q1c = randInt(0, GRID-1);
  questions.push({
    q: `What symbol is at row ${q1r+1}, column ${q1c+1}?`,
    answer: grid[q1r][q1c],
    options: shuffle([...new Set([grid[q1r][q1c], ...shuffle(symbols).slice(0, 3)])]).slice(0, 4)
  });
  
  // Q2: How many of symbol X?
  const q2sym = symbols[randInt(0, symbols.length - 1)];
  const q2count = grid.flat().filter(s => s === q2sym).length;
  questions.push({
    q: `How many ${q2sym} symbols are in the grid?`,
    answer: q2count,
    options: shuffle([...new Set([q2count, ...[0,1,2,3,4,5].filter(n => n !== q2count).slice(0,3)])]).slice(0, 4).sort()
  });
  
  // Q3: What's in the corners?
  const corners = [grid[0][0], grid[0][GRID-1], grid[GRID-1][0], grid[GRID-1][GRID-1]];
  const q3corner = randInt(0, 3);
  questions.push({
    q: `What symbol is in the ${['top-left','top-right','bottom-left','bottom-right'][q3corner]} corner?`,
    answer: corners[q3corner],
    options: shuffle([...new Set([corners[q3corner], ...shuffle(symbols).slice(0, 3)])]).slice(0, 4)
  });

  area.innerHTML = `
    <div class="level-title">MEMORY OVERLOAD</div>
    <div class="level-desc">Memorize the entire grid. Then answer 3 questions about it.</div>
    <div class="level-rules">10 seconds to memorize. Then answer all 3 questions. 60 seconds total.</div>
    <div class="info-box highlight" id="l5-status">MEMORIZE</div>
    <div id="l5-grid" style="display:inline-grid;grid-template-columns:repeat(${GRID},55px);gap:4px;"></div>
    <div id="l5-questions" style="display:none;max-width:600px;width:100%;"></div>
  `;

  const gridEl = document.getElementById('l5-grid');
  grid.forEach(row => {
    row.forEach(sym => {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.style.fontSize = '1.5rem';
      cell.textContent = sym;
      cell.classList.add('locked');
      gridEl.appendChild(cell);
    });
  });

  setTimeout(() => {
    gridEl.style.display = 'none';
    document.getElementById('l5-status').textContent = 'ANSWER THE QUESTIONS';
    document.getElementById('l5-questions').style.display = '';
    
    const qEl = document.getElementById('l5-questions');
    let currentQ = 0;
    const answers = [];

    function showQuestion() {
      if (currentQ >= questions.length) {
        state.inputLocked = true;
        const allCorrect = answers.every((a, i) => String(a) === String(questions[i].answer));
        if (allCorrect) completeLevel();
        else failLevel('Wrong answers.');
        return;
      }
      const q = questions[currentQ];
      qEl.innerHTML = `
        <div class="panel-title">QUESTION ${currentQ + 1} OF ${questions.length}</div>
        <div class="info-box highlight" style="margin:0.5rem 0;font-size:1rem;">${q.q}</div>
        <div class="choices" style="margin-top:1rem;">
          ${q.options.map((opt, i) => `<div class="choice-btn" data-val="${opt}" style="font-size:1.2rem;min-width:60px;">${opt}</div>`).join('')}
        </div>
      `;
      qEl.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          answers.push(btn.dataset.val);
          playClick();
          currentQ++;
          showQuestion();
        });
      });
    }

    showQuestion();
    startTimer(60);
  }, 10000);
}

// ===== LEVEL 7: ATTENTION SPLIT =====
// Dual task: track moving objects while solving math
function level7() {
  const area = document.getElementById('game-area');
  const TRACK_SIZE = 5;
  const ROUNDS = 8;
  let round = 0;
  let score = 0;
  
  area.innerHTML = `
    <div class="level-title">ATTENTION SPLIT</div>
    <div class="level-desc">Track the highlighted cell as it moves, AND solve the math problem. Both must be correct.</div>
    <div class="level-rules">Watch the flash, track where it moves, solve math. ${ROUNDS} rounds. 120 seconds.</div>
    <div class="panels" style="max-width:700px;">
      <div class="panel">
        <div class="panel-title">TRACK THE DOT</div>
        <div id="l7-grid" style="display:inline-grid;grid-template-columns:repeat(${TRACK_SIZE},40px);gap:3px;"></div>
      </div>
      <div class="panel">
        <div class="panel-title">SOLVE THE MATH</div>
        <div id="l7-math" style="font-family:Orbitron;font-size:1.5rem;color:var(--accent);margin:1rem 0;"></div>
        <input type="number" class="game-input" id="l7-math-input" style="width:120px;" placeholder="Answer">
      </div>
    </div>
    <div class="info-box highlight" id="l7-status">Round 1/${ROUNDS}</div>
    <div id="l7-answers" style="margin-top:0.5rem;"></div>
  `;

  let currentPos = 0;
  let targetPos = 0;
  let mathAnswer = 0;
  let trackingAnswer = -1;
  let phase = 'show'; // show, move, answer

  function generateGrid() {
    const gridEl = document.getElementById('l7-grid');
    gridEl.innerHTML = '';
    for (let i = 0; i < TRACK_SIZE * TRACK_SIZE; i++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.style.width = '40px';
      cell.style.height = '40px';
      cell.dataset.idx = i;
      cell.addEventListener('click', () => {
        if (phase !== 'answer') return;
        document.querySelectorAll('#l7-grid .grid-cell').forEach(c => c.classList.remove('active'));
        cell.classList.add('active');
        trackingAnswer = i;
      });
      gridEl.appendChild(cell);
    }
    return gridEl;
  }

  function generateMath() {
    const ops = ['+', '×'];
    const op = ops[randInt(0, 1)];
    let a, b;
    if (op === '+') {
      a = randInt(10, 99);
      b = randInt(10, 99);
      mathAnswer = a + b;
    } else {
      a = randInt(3, 12);
      b = randInt(3, 12);
      mathAnswer = a * b;
    }
    document.getElementById('l7-math').textContent = `${a} ${op} ${b} = ?`;
    return mathAnswer;
  }

  function doRound() {
    if (round >= ROUNDS) {
      state.inputLocked = true;
      if (score >= ROUNDS - 2) completeLevel();
      else failLevel(`${score}/${ROUNDS} correct.`);
      return;
    }
    round++;
    document.getElementById('l7-status').textContent = `Round ${round}/${ROUNDS} — Score: ${score}`;
    document.getElementById('l7-answers').textContent = '';
    trackingAnswer = -1;
    document.getElementById('l7-math-input').value = '';
    
    const gridEl = generateGrid();
    generateMath();
    
    // Show starting position
    currentPos = randInt(0, TRACK_SIZE * TRACK_SIZE - 1);
    gridEl.children[currentPos].classList.add('active');
    document.getElementById('l7-status').textContent = 'MEMORIZE THE DOT POSITION...';
    phase = 'show';
    
    setTimeout(() => {
      // Animate movement
      let moves = 3 + round;
      let pos = currentPos;
      const moveInterval = setInterval(() => {
        document.querySelectorAll('#l7-grid .grid-cell').forEach(c => c.classList.remove('active'));
        const dir = randInt(0, 3); // 0=up,1=right,2=down,3=left
        const row = Math.floor(pos / TRACK_SIZE);
        const col = pos % TRACK_SIZE;
        let newRow = row, newCol = col;
        if (dir === 0 && row > 0) newRow--;
        if (dir === 1 && col < TRACK_SIZE-1) newCol++;
        if (dir === 2 && row < TRACK_SIZE-1) newRow++;
        if (dir === 3 && col > 0) newCol--;
        pos = newRow * TRACK_SIZE + newCol;
        gridEl.children[pos].classList.add('active');
        playTone(400 + pos * 20, 0.05, 'square');
        moves--;
        if (moves <= 0) {
          clearInterval(moveInterval);
          targetPos = pos;
          setTimeout(() => {
            document.querySelectorAll('#l7-grid .grid-cell').forEach(c => c.classList.remove('active'));
            phase = 'answer';
            document.getElementById('l7-status').textContent = 'WHERE IS THE DOT? Click the grid. Also solve the math.';
            document.getElementById('l7-math-input').focus();
          }, 500);
        }
      }, 400);
    }, 2000);
    
    // Set up answer submission
    const mathInput = document.getElementById('l7-math-input');
    const handler = (e) => {
      if (e.key === 'Enter' || e.type === 'click') {
        const mathVal = parseInt(mathInput.value);
        if (isNaN(mathVal) || trackingAnswer === -1) return;
        
        const mathOk = mathVal === mathAnswer;
        const trackOk = trackingAnswer === targetPos;
        
        if (mathOk && trackOk) {
          score++;
          playClick();
        } else {
          playFail();
          let msg = 'Wrong: ';
          if (!mathOk) msg += 'math ';
          if (!trackOk) msg += 'tracking ';
          document.getElementById('l7-answers').textContent = msg;
        }
        
        mathInput.removeEventListener('keydown', handler);
        setTimeout(doRound, 500);
      }
    };
    mathInput.addEventListener('keydown', handler);
  }

  doRound();
  startTimer(120);
}

// ===== LEVEL 8: PATTERN MAZE =====
// Complex number sequence with multiple rules operating simultaneously
function level8() {
  const area = document.getElementById('game-area');
  
  // Generate a sequence with a compound rule
  // Rule: each number = prev + increment, but every 3rd position doubles the increment
  // And every 5th position subtracts 1
  const start = randInt(1, 5);
  const baseInc = randInt(2, 4);
  const seqLen = 10;
  const showLen = 7;
  
  const sequence = [start];
  for (let i = 1; i < seqLen; i++) {
    let val = sequence[i-1] + baseInc;
    if ((i + 1) % 3 === 0) val += baseInc; // every 3rd: double increment
    if ((i + 1) % 5 === 0) val -= 1; // every 5th: subtract 1
    sequence.push(val);
  }
  
  // Also add a parallel sequence rule
  const altStart = randInt(1, 3);
  const altInc = randInt(1, 3);
  const altSeq = Array.from({length: seqLen}, (_, i) => altStart + i * altInc);
  
  area.innerHTML = `
    <div class="level-title">PATTERN MAZE</div>
    <div class="level-desc">Two sequences run in parallel. Find the compound rule and predict the last 3 numbers of each.</div>
    <div class="level-rules">Each sequence has a hidden rule combining addition and special positions. 120 seconds.</div>
    <div class="panels">
      <div class="panel">
        <div class="panel-title">SEQUENCE A</div>
        <div class="matrix-display" id="l8-seqA">${sequence.slice(0, showLen).map((n, i) => i === showLen - 1 ? '?' : n).join('  ')}</div>
      </div>
      <div class="panel">
        <div class="panel-title">SEQUENCE B</div>
        <div class="matrix-display" id="l8-seqB">${altSeq.slice(0, showLen).map((n, i) => i === showLen - 1 ? '?' : n).join('  ')}</div>
      </div>
    </div>
    <div style="margin-top:1.5rem;">
      <div class="panel-title" style="margin-bottom:0.5rem;">ENTER THE NEXT 3 NUMBERS FOR EACH SEQUENCE</div>
      <div style="display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;">
        <div>
          <div style="font-size:0.7rem;color:var(--primary);margin-bottom:0.3rem;">Sequence A (3 numbers)</div>
          <div style="display:flex;gap:6px;">
            <input type="number" class="game-input" id="l8-a1" style="width:60px;padding:0.5rem;" placeholder="?">
            <input type="number" class="game-input" id="l8-a2" style="width:60px;padding:0.5rem;" placeholder="?">
            <input type="number" class="game-input" id="l8-a3" style="width:60px;padding:0.5rem;" placeholder="?">
          </div>
        </div>
        <div>
          <div style="font-size:0.7rem;color:var(--accent);margin-bottom:0.3rem;">Sequence B (3 numbers)</div>
          <div style="display:flex;gap:6px;">
            <input type="number" class="game-input" id="l8-b1" style="width:60px;padding:0.5rem;" placeholder="?">
            <input type="number" class="game-input" id="l8-b2" style="width:60px;padding:0.5rem;" placeholder="?">
            <input type="number" class="game-input" id="l8-b3" style="width:60px;padding:0.5rem;" placeholder="?">
          </div>
        </div>
      </div>
    </div>
    <button class="btn btn-small" style="margin-top:1rem;" id="l8-check">VERIFY</button>
    <div class="info-box" id="l8-hint" style="margin-top:0.5rem;">Hint: The rules involve position-based modifications.</div>
  `;

  document.getElementById('l8-check').addEventListener('click', () => {
    const a1 = parseInt(document.getElementById('l8-a1').value);
    const a2 = parseInt(document.getElementById('l8-a2').value);
    const a3 = parseInt(document.getElementById('l8-a3').value);
    const b1 = parseInt(document.getElementById('l8-b1').value);
    const b2 = parseInt(document.getElementById('l8-b2').value);
    const b3 = parseInt(document.getElementById('l8-b3').value);
    
    if ([a1,a2,a3,b1,b2,b3].some(isNaN)) {
      document.getElementById('l8-hint').textContent = 'Fill all 6 fields!';
      document.getElementById('l8-hint').style.borderColor = 'var(--danger)';
      return;
    }
    
    state.inputLocked = true;
    const aCorrect = [a1,a2,a3].every((v, i) => v === sequence[showLen + i]);
    const bCorrect = [b1,b2,b3].every((v, i) => v === altSeq[showLen + i]);
    
    if (aCorrect && bCorrect) completeLevel();
    else failLevel(`Wrong. A: ${sequence.slice(showLen).join(', ')} | B: ${altSeq.slice(showLen).join(', ')}`);
  });

  startTimer(120);
}

// ===== LEVEL 9: SYNAPSE FIRE =====
// Combine multiple sub-problems into one answer
function level9() {
  const area = document.getElementById('game-area');
  
  // 4 sub-problems that combine into one final answer
  // Sub 1: Memory - a grid flashes, count specific symbols
  // Sub 2: Logic - a simple deduction  
  // Sub 3: Math - arithmetic
  // Sub 4: Spatial - count rotations
  
  const gridSize = 4;
  const symbols = ['▲', '■', '●', '◆'];
  const grid = Array.from({length: gridSize}, () => 
    Array.from({length: gridSize}, () => symbols[randInt(0, symbols.length - 1)])
  );
  
  const targetSym = symbols[randInt(0, 3)];
  const symCount = grid.flat().filter(s => s === targetSym).length;
  
  // Logic: A > B, B > C, C > D, what's the order? (always A>B>C>D, find A+D)
  const vals = shuffle([2, 4, 6, 8]);
  const logicAnswer = vals[0] + vals[3]; // largest + smallest

        <div class="panel-title">③ MATH</div>

      <input type="number" class="game-input" id="l9-answer" style="width:150px;" placeholder="?">

    row.forEach(sym => {
      const cell = document.createElement('div');
      cell.className = 'grid-cell locked';
      cell.style.width = '35px';

      cell.textContent = sym;
      gridEl.appendChild(cell);

  setTimeout(() => {

  document.getElementById('l9-check').addEventListener('click', () => {

    else failLevel(`Wrong. Correct sum: ${finalAnswer} (${symCount}+${logicAnswer}+${mathAnswer}+${triangleCount})`);

  startTimer(150);
}

      </div>
      <div class="choices" id="l10-rot-choices">
        ${[1,2,3,4].map(n => `<div class="choice-btn rot-opt" data-val="${n}">${n}</div>`).join('')}

      </div>
      <div id="l10-summary" style="font-size:0.8rem;color:var(--primary);margin:0.5rem 0;"></div>
      <input type="number" class="game-input" id="l10-answer" style="width:150px;" placeholder="Final answer">
      <button class="btn btn-small" style="margin-left:0.5rem;" id="l10-submit">SUBMIT</button>
    </div>
    
    <div class="info-box highlight" id="l10-status">PHASE 1 — MEMORIZE</div>
  `;

  let stroopVal = -1;
  let rotVal = -1;
  const memSum = memSeq.reduce((a, b) => a + b, 0);
  const rotAnswer = ((0 + rotSteps) % 4) + 1; // position after rotation

  // Phase 1: memorize
  setTimeout(() => {
    document.getElementById('l10-mem').style.opacity = '0.1';
    document.getElementById('l10-phase2').style.display = '';
    document.getElementById('l10-status').textContent = 'PHASE 2 — STROOP';
    
    // Stroop choices
    document.querySelectorAll('.stroop-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        stroopVal = parseInt(btn.dataset.val) + 1;
        document.querySelectorAll('.stroop-opt').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        playClick();
        document.getElementById('l10-phase3').style.display = '';
        document.getElementById('l10-status').textContent = 'PHASE 3 — PATTERN';
      });
    });
  }, 6000);

  // When pattern input gets a value, show phase 4
  document.getElementById('l10-pat').addEventListener('input', () => {
    if (document.getElementById('l10-pat').value) {
      document.getElementById('l10-phase4').style.display = '';
      document.getElementById('l10-status').textContent = 'PHASE 4 — ROTATION';
    }
  });

  // Rotation choices
  document.querySelectorAll('.rot-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      rotVal = parseInt(btn.dataset.val);
      document.querySelectorAll('.rot-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      playClick();
      
      // Show final
      document.getElementById('l10-final').style.display = '';
      document.getElementById('l10-status').textContent = 'FINAL — COMBINE ALL ANSWERS';
      const patVal = parseInt(document.getElementById('l10-pat').value) || 0;
      document.getElementById('l10-summary').textContent = 
        `${memSum} + ${stroopVal} + ${patVal} + ${rotVal} = ?`;
    });
  });

  // Submit
  document.getElementById('l10-submit').addEventListener('click', () => {
    const val = parseInt(document.getElementById('l10-answer').value);
    const patVal = parseInt(document.getElementById('l10-pat').value);
    if (isNaN(val) || isNaN(patVal) || stroopVal === -1 || rotVal === -1) {
      document.getElementById('l10-status').textContent = 'Complete all phases first!';
      return;
    }
    
    const correctAnswer = memSum + stroopVal + patAnswer + rotAnswer;
    state.inputLocked = true;
    
    if (val === correctAnswer) {
      completeLevel();
      // Override to win
      setTimeout(winGame, 500);
    } else {
      failLevel(`Wrong. Answer was ${correctAnswer} (${memSum}+${stroopVal}+${patAnswer}+${rotAnswer})`);
    }
  });

  startTimer(180);
}

// ===== LEVEL 11: REACTION STORM =====
// Pure reaction time - targets appear randomly, click FAST
function level11() {
  const area = document.getElementById('game-area');
  const GRID = 6;
  const TARGETS_NEEDED = 20;
  let hit = 0;
  let missed = 0;
  let currentTarget = -1;
  let targetTimeout = null;
  let reactionTimes = [];

  area.innerHTML = `
    <div class="level-title">REACTION STORM</div>
    <div class="level-desc">Targets appear randomly. Click them FAST. You need ${TARGETS_NEEDED} hits. Miss 5 and you die.</div>
    <div class="level-rules">Average reaction time under 600ms to survive. Speed = survival.</div>
    <div class="info-box highlight" id="l11-status">Hit: 0/${TARGETS_NEEDED} | Missed: 0/5</div>
    <div id="l11-grid" style="display:inline-grid;grid-template-columns:repeat(${GRID},55px);gap:4px;"></div>
    <div class="info-box" id="l11-avg" style="margin-top:0.5rem;">Avg reaction: --ms</div>
  `;

  const gridEl = document.getElementById('l11-grid');
  for (let i = 0; i < GRID * GRID; i++) {
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.style.width = '55px';
    cell.style.height = '55px';
    cell.dataset.idx = i;
    cell.addEventListener('click', () => handleClick(i));
    gridEl.appendChild(cell);
  }

  let targetAppearTime = 0;

  function spawnTarget() {
    if (hit >= TARGETS_NEEDED || missed >= 5) return;
    // Clear previous
    if (currentTarget >= 0) {
      gridEl.children[currentTarget].classList.remove('active');
      gridEl.children[currentTarget].style.background = '';
    }
    // Miss if previous wasn't clicked
    if (currentTarget >= 0 && Date.now() - targetAppearTime > 1500) {
      missed++;
      updateStatus();
      if (missed >= 5) {
        failLevel('Too slow. 5 targets escaped.');
        return;
      }
    }
    // New target
    let next;
    do { next = randInt(0, GRID * GRID - 1); } while (next === currentTarget);
    currentTarget = next;
    targetAppearTime = Date.now();
    const cell = gridEl.children[currentTarget];
    cell.classList.add('active');
    cell.style.background = 'var(--danger)';
    cell.style.boxShadow = '0 0 25px var(--danger)';
    playTone(600, 0.05, 'square');

    targetTimeout = setTimeout(spawnTarget, 1500 - Math.min(hit * 50, 800));
  }

  function handleClick(idx) {
    if (state.inputLocked || idx !== currentTarget) return;
    const rt = Date.now() - targetAppearTime;
    reactionTimes.push(rt);
    hit++;
    playClick();

    gridEl.children[idx].classList.remove('active');
    gridEl.children[idx].style.background = 'var(--success)';
    gridEl.children[idx].style.boxShadow = '';
    setTimeout(() => {
      gridEl.children[idx].style.background = '';
    }, 100);

    updateStatus();

    if (hit >= TARGETS_NEEDED) {
      state.inputLocked = true;
      clearTimeout(targetTimeout);
      const avg = Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length);
      if (avg < 800) completeLevel();
      else failLevel(`Too slow! Avg: ${avg}ms. Need under 800ms.`);
      return;
    }

    clearTimeout(targetTimeout);
    setTimeout(spawnTarget, 200);
  }

  function updateStatus() {
    const avg = reactionTimes.length ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length) : 0;
    document.getElementById('l11-status').textContent = `Hit: ${hit}/${TARGETS_NEEDED} | Missed: ${missed}/5`;
    document.getElementById('l11-avg').textContent = `Avg reaction: ${avg}ms`;
  }

  setTimeout(spawnTarget, 1000);
  startTimer(60);
}

// ===== LEVEL 12: PATTERN COMBAT =====
// Rapid pattern recognition - identify the odd one out at speed
function level12() {
  const area = document.getElementById('game-area');
  const ROUNDS = 15;
  let round = 0;
  let score = 0;
  let reactionTimes = [];

  const patterns = [
    ['▲', '▲', '▲', '■'],
    ['●', '●', '◆', '●'],
    ['■', '★', '■', '■'],
    ['◆', '◆', '◆', '●'],
    ['★', '■', '★', '★'],
  ];

  area.innerHTML = `
    <div class="level-title">PATTERN COMBAT</div>
    <div class="level-desc">4 shapes appear. 3 are the same, 1 is different. Click the ODD one out. FAST.</div>
    <div class="level-rules">${ROUNDS} rounds. Get ${ROUNDS-3}+ correct. Speed bonus for fast reactions.</div>
    <div class="info-box highlight" id="l12-status">Round 1/${ROUNDS}</div>
    <div id="l12-display" class="sequence-display" style="margin:1.5rem 0;"></div>
    <div class="progress-bar"><div class="progress-fill" id="l12-progress" style="width:0%"></div></div>
    <div class="info-box" id="l12-rt" style="margin-top:0.5rem;">Reaction: --ms</div>
  `;

  function nextRound() {
    if (round >= ROUNDS) {
      state.inputLocked = true;
      if (score >= ROUNDS - 3) completeLevel();
      else failLevel(`${score}/${ROUNDS} correct. Need ${ROUNDS-3}+.`);
      return;
    }
    round++;
    document.getElementById('l12-status').textContent = `Round ${round}/${ROUNDS} — Score: ${score}`;

    const display = document.getElementById('l12-display');
    display.innerHTML = '';

    // Pick a pattern or generate random
    let shapes;
    if (Math.random() < 0.7) {
      shapes = [...patterns[randInt(0, patterns.length - 1)]];
    } else {
      const sym = ['▲', '■', '●', '◆', '★'][randInt(0, 4)];
      let oddSym;
      do { oddSym = ['▲', '■', '●', '◆', '★'][randInt(0, 4)]; } while (oddSym === sym);
      shapes = [sym, sym, sym, sym];
      shapes[randInt(0, 3)] = oddSym;
    }

    const oddIdx = shapes.findIndex((s, i) => shapes.filter((x, j) => j !== i).every(x => x === shapes.filter((_, k) => k !== i)[0]) || shapes.indexOf(s) === shapes.lastIndexOf(s));
    // Find the odd one out
    const counts = {};
    shapes.forEach(s => counts[s] = (counts[s] || 0) + 1);
    const oddShape = Object.keys(counts).find(k => counts[k] === 1);
    const correctIdx = shapes.indexOf(oddShape);

    const startTime = Date.now();

    shapes.forEach((sym, i) => {
      const btn = document.createElement('div');
      btn.className = 'seq-item';
      btn.style.borderColor = 'var(--glass-border)';
      btn.style.fontSize = '2rem';
      btn.textContent = sym;
      btn.addEventListener('click', () => {
        if (state.inputLocked) return;
        const rt = Date.now() - startTime;
        reactionTimes.push(rt);

        if (i === correctIdx) {
          score++;
          btn.style.borderColor = 'var(--success)';
          btn.style.background = 'rgba(0,255,136,0.2)';
          playClick();
        } else {
          btn.style.borderColor = 'var(--danger)';
          btn.style.background = 'rgba(255,51,51,0.2)';
          // Highlight correct
          display.children[correctIdx].style.borderColor = 'var(--success)';
          playFail();
        }
        document.getElementById('l12-rt').textContent = `Reaction: ${rt}ms`;
        document.getElementById('l12-progress').style.width = `${(round / ROUNDS) * 100}%`;
        setTimeout(nextRound, 400);
      });
      display.appendChild(btn);
    });
  }

  nextRound();
  startTimer(90);
}

// Everything accelerates - dodge obstacles, collect items, answer math
function level13() {
  const area = document.getElementById('game-area');
  const LANE_COUNT = 3;
  const ROUNDS = 12;
  let round = 0;
  let score = 0;
  let playerLane = 1;
  let lives = 3;

  area.innerHTML = `
    <div class="level-title">SPEED DEMON</div>
    <div class="level-desc">Items fall from top. Dodge obstacles (🔴), collect points (🟢), answer math fast.</div>
    <div class="level-rules">Press 1/2/3 to switch lanes. Dodge 🔴, grab 🟢. ${ROUNDS} rounds. 3 lives.</div>

    <div id="l13-field" style="position:relative;width:300px;height:350px;border:1px solid var(--glass-border);overflow:hidden;background:rgba(0,0,0,0.3);margin:1rem auto;"></div>
    <div id="l13-math" style="display:none;text-align:center;">
      <div class="panel-title">QUICK MATH — BONUS!</div>

    </div>
    <div class="info-box" style="margin-top:0.5rem;font-size:0.7rem;">Keys: 1 = Left | 2 = Center | 3 = Right</div>
  `;

  const field = document.getElementById('l13-field');
  const laneWidth = 100;

  // Player
  const player = document.createElement('div');
  player.style.cssText = `position:absolute;bottom:10px;width:${laneWidth-10}px;height:30px;background:var(--primary);border-radius:6px;left:${playerLane * laneWidth + 5}px;transition:left 0.15s;box-shadow:0 0 15px var(--primary);`;
  field.appendChild(player);

  function updatePlayer() {
    player.style.left = `${playerLane * laneWidth + 5}px`;
  }

  // Keyboard controls
  const keyHandler = (e) => {
    if (state.inputLocked) return;
    if (e.key === '1') { playerLane = 0; updatePlayer(); }
    if (e.key === '2') { playerLane = 1; updatePlayer(); }
    if (e.key === '3') { playerLane = 2; updatePlayer(); }
  };
  document.addEventListener('keydown', keyHandler);

  // Touch/click controls for mobile
  field.addEventListener('click', (e) => {
    const rect = field.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x < 100) playerLane = 0;
    else if (x < 200) playerLane = 1;
    else playerLane = 2;
    updatePlayer();
  });

  let interval;

  function spawnItem() {
    if (round >= ROUNDS || lives <= 0) {
      clearInterval(interval);
      document.removeEventListener('keydown', keyHandler);
      state.inputLocked = true;
      if (score >= ROUNDS * 50 && lives > 0) completeLevel();
      else failLevel(`Score: ${score}. Not enough.`);
      return;
    }

    const lane = randInt(0, 2);
    const isObstacle = Math.random() < 0.4;
    const item = document.createElement('div');
    item.style.cssText = `position:absolute;top:-30px;left:${lane * laneWidth + 30}px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border-radius:50%;`;
    
    if (isObstacle) {
      item.textContent = '🔴';
      item.style.background = 'rgba(255,51,51,0.3)';
    } else {
      item.textContent = '🟢';
      item.style.background = 'rgba(0,255,136,0.3)';
    }
    field.appendChild(item);

    const speed = 3 + Math.min(round * 0.5, 5); // Accelerating
    let y = -30;
    const fallInterval = setInterval(() => {
      y += speed;
      item.style.top = `${y}px`;

      if (y >= 300 && y <= 340) {
        if (lane === playerLane) {
          if (isObstacle) {
            lives--;
            playFail();
            item.style.background = 'rgba(255,51,51,0.6)';
          } else {
            score += 100;
            playClick();
            item.style.background = 'rgba(0,255,136,0.6)';
          }
          clearInterval(fallInterval);
          setTimeout(() => item.remove(), 100);
        }
      }

      if (y > 360) {
        if (!isObstacle) score -= 20; // Missed a good item
        clearInterval(fallInterval);
        item.remove();
      }
    }, 30);

    round++;
    updateStatus();

    // Occasional math bonus
    if (round % 4 === 0 && !isObstacle) {
      const a = randInt(2, 12), b = randInt(2, 12);
      const ans = a * b;
      document.getElementById('l13-math').style.display = '';
      document.getElementById('l13-math-q').textContent = `${a} × ${b} = ?`;
      const input = document.getElementById('l13-math-input');
      input.value = '';
      input.focus();
      const mathHandler = (e) => {
        if (e.key === 'Enter') {
          if (parseInt(input.value) === ans) {
            score += 200;
            playSuccess();
          }
          document.getElementById('l13-math').style.display = 'none';
          input.removeEventListener('keydown', mathHandler);
        }
      };
      input.addEventListener('keydown', mathHandler);
    }
  }

  function updateStatus() {
    document.getElementById('l13-status').textContent = 
      `Round ${Math.min(round, ROUNDS)}/${ROUNDS} | Score: ${score} | Lives: ${'♥'.repeat(lives)}${'♡'.repeat(3 - lives)}`;
  }

  interval = setInterval(spawnItem, 1200);
  startTimer(75);
}

    setTimeout(() => {
      if (!answered) {
        if (isReal) {
          // Missed a real signal
        }
        round++;
        document.getElementById('l14-progress').style.width = `${(round / ROUNDS) * 100}%`;
        nextRound();
      }
    }, 1500 - Math.min(round * 30, 600));
  }

  function handleHit() {
    if (answered || state.inputLocked) return;
    answered = true;
    const rt = Date.now() - symbolTime;
    reactionTimes.push(rt);
    round++;

    if (isReal) {
      score++;
      playClick();
      document.getElementById('l14-rt').textContent = `Reaction: ${rt}ms ✓`;
    } else {
      falsePositives++;
      playFail();
      document.getElementById('l14-rt').textContent = `WRONG! That was a decoy! ✗`;
    }

    document.getElementById('l14-progress').style.width = `${(round / ROUNDS) * 100}%`;
    setTimeout(nextRound, 300);
  }

  function handleSkip() {
    if (answered || state.inputLocked) return;
    answered = true;
    round++;

    if (!isReal) {
      score++;
      playClick();
      document.getElementById('l14-rt').textContent = `Correct skip ✓`;
    } else {
      playFail();
      document.getElementById('l14-rt').textContent = `Missed a real signal! ✗`;

    document.getElementById('l14-progress').style.width = `${(round / ROUNDS) * 100}%`;
    setTimeout(nextRound, 300);
  }

  document.getElementById('l14-hit').addEventListener('click', handleHit);
  document.getElementById('l14-skip').addEventListener('click', handleSkip);

  // Keyboard: Space = Hit, any other = Skip
  const keyHandler = (e) => {
    if (e.code === 'Space') { e.preventDefault(); handleHit(); }
    else if (e.key === 's' || e.key === 'S') handleSkip();
  };
  document.addEventListener('keydown', keyHandler);

  nextRound();
  startTimer(60);
}

    function nextChallenge() {
      if (chIdx >= challenges.length) {
        if (roundScore === challenges.length) score++;
        document.getElementById('l15-progress').style.width = `${(round / ROUNDS) * 100}%`;
        setTimeout(runRound, 300);
        return;
      }

      const type = challenges[chIdx];
      const chEl = document.getElementById('l15-challenge');
      const inEl = document.getElementById('l15-input');

      if (type === 'reaction') {
        // Click when it turns green
        chEl.innerHTML = `<div style="font-size:1.5rem;color:var(--danger);">WAIT FOR GREEN...</div>`;
        inEl.innerHTML = `<div id="l15-react-btn" style="width:100px;height:100px;border-radius:50%;background:var(--danger);margin:0 auto;cursor:pointer;transition:background 0.1s;"></div>`;
        const btn = document.getElementById('l15-react-btn');
        const delay = randInt(1000, 3000);
        let greenTime = 0;
        let reacted = false;

        setTimeout(() => {
          btn.style.background = 'var(--success)';
          btn.style.boxShadow = '0 0 30px var(--success)';
          greenTime = Date.now();
        }, delay);

        btn.addEventListener('click', () => {
          if (reacted) return;
          reacted = true;
          if (greenTime && Date.now() - greenTime < 1000) {
            roundScore++;
            playClick();
          } else if (!greenTime) {
            playFail(); // Too early
          }
          chIdx++;
          nextChallenge();
        });

      } else if (type === 'pattern') {
        // Find the odd one
        const sym = ['▲', '■', '●', '◆'][randInt(0, 3)];
        let oddSym;
        do { oddSym = ['▲', '■', '●', '◆'][randInt(0, 3)]; } while (oddSym === sym);
        const shapes = [sym, sym, sym, sym];
        const oddPos = randInt(0, 3);
        shapes[oddPos] = oddSym;

        chEl.innerHTML = `<div style="font-size:3rem;letter-spacing:1rem;">${shapes.join('')}</div>`;
        inEl.innerHTML = `<div class="choices">${shapes.map((s, i) => `<div class="choice-btn" data-idx="${i}" style="font-size:1.5rem;min-width:50px;">${i + 1}</div>`).join('')}</div>`;
        
        inEl.querySelectorAll('.choice-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            if (parseInt(btn.dataset.idx) === oddPos) {
              roundScore++;
              playClick();
            } else {
              playFail();
            }
            chIdx++;
            nextChallenge();
          });
        });

      } else if (type === 'math') {
        const a = randInt(5, 20), b = randInt(2, 9);
        const op = Math.random() < 0.5 ? '×' : '+';
        const ans = op === '×' ? a * b : a + b;

        chEl.innerHTML = `<div style="font-family:Orbitron;font-size:2.5rem;color:var(--accent);">${a} ${op} ${b} = ?</div>`;
        inEl.innerHTML = `<input type="number" class="game-input" id="l15-math-in" style="width:100px;" placeholder="?">`;
        
        const input = document.getElementById('l15-math-in');
        input.focus();
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            if (parseInt(input.value) === ans) {
              roundScore++;
              playClick();
            } else {
              playFail();
            }
            chIdx++;
            nextChallenge();
          }
        });

      } else if (type === 'stroop') {
        const colors = [
          { name: 'RED', hex: '#ff3333' },
          { name: 'BLUE', hex: '#0066ff' },
          { name: 'GREEN', hex: '#00ff88' },
          { name: 'YELLOW', hex: '#ffe600' }
        ];
        const word = randInt(0, 3);
        let color = randInt(0, 3);
        while (color === word) color = randInt(0, 3);

        chEl.innerHTML = `<div style="font-family:Orbitron;font-size:3rem;font-weight:700;color:${colors[color].hex};">${colors[word].name}</div>`;
        inEl.innerHTML = `<div class="choices">${colors.map((c, i) => `<div class="choice-btn stroop-btn" data-idx="${i}" style="color:${c.hex};">${c.name}</div>`).join('')}</div>`;
        
        inEl.querySelectorAll('.stroop-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            if (parseInt(btn.dataset.idx) === color) {
              roundScore++;
              playClick();
            } else {
              playFail();
            }
            chIdx++;
            nextChallenge();
          });
        });

      } else if (type === 'memory') {
        const seq = Array.from({length: 4}, () => randInt(1, 9));
        chEl.innerHTML = `<div style="font-family:Orbitron;font-size:2rem;color:var(--primary);">${seq.join('  ')}</div>`;
        inEl.innerHTML = `<div style="color:rgba(255,255,255,0.4);font-size:0.8rem;">Memorizing...</div>`;

        setTimeout(() => {
          chEl.innerHTML = `<div style="font-family:Orbitron;font-size:2rem;color:rgba(255,255,255,0.15);">${seq.join('  ')}</div>`;
          inEl.innerHTML = `<div style="color:rgba(255,255,255,0.6);font-size:0.8rem;">What was the sequence?</div>
            <input type="text" class="game-input" id="l15-mem-in" style="width:150px;" placeholder="e.g. 1234">`;
          
          const input = document.getElementById('l15-mem-in');
          input.focus();
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              if (input.value.replace(/\s/g, '') === seq.join('')) {
                roundScore++;
                playClick();
              } else {
                playFail();
              }
              chIdx++;
              nextChallenge();
            }
          });
        }, 2000);
      }
    }

    nextChallenge();
  }

  runRound();
  startTimer(120);
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && state.phase === 'playing') {
    if (confirm('Quit current game?')) restartGame();
  }
});
</script>
